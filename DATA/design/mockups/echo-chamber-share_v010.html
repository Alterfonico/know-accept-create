<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>Echo Chamber · shared view</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #07070d;
        --bg2: #0d0d18;
        --bg3: #111122;
        --life: #7df9c2;
        --upset: #ff6b6b;
        --poke: #ffb347;
        --text: #d0d0d8;
        --dim: #484860;
        --border: rgba(255, 255, 255, 0.05);
        --bubble: #12121e;
        --mono: "IBM Plex Mono", monospace;
        --disp: "Syne", sans-serif;
        --safe-t: env(safe-area-inset-top, 0px);
        --safe-b: env(safe-area-inset-bottom, 0px);
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--mono);
        height: 100dvh;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      /* ════════════════════════════════
   LAYOUT
════════════════════════════════ */
      .app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
      }

      /* ════════════════════════════════
   TOP NAV
════════════════════════════════ */
      .topnav {
        flex-shrink: 0;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        padding: calc(var(--safe-t) + 10px) 16px 10px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .nav-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--bg3);
        border: 1px solid rgba(125, 249, 194, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .nav-avatar-inner {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--life);
        box-shadow: 0 0 8px var(--life);
        animation: breathe 2.8s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.3); }
      }

      .nav-info { flex: 1; min-width: 0; }
      .nav-name {
        font-family: var(--disp);
        font-size: 15px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 3px;
        line-height: 1.2;
      }
      .nav-sub {
        font-size: 9px;
        letter-spacing: 1.5px;
        color: var(--dim);
        margin-top: 1px;
      }

      /* ════════════════════════════════
   CHAT AREA
════════════════════════════════ */
      .chat {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 12px 14px calc(var(--safe-b) + 16px);
        display: flex;
        flex-direction: column;
        gap: 2px;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
      }

      /* ── date separator ── */
      .date-sep {
        align-self: center;
        font-size: 9px;
        letter-spacing: 1.8px;
        color: var(--dim);
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 3px 10px;
        margin: 10px 0 4px;
        text-transform: lowercase;
      }

      /* ── message row ── */
      .msg {
        display: flex;
        justify-content: flex-end;
        padding: 0 2px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.3s ease, transform 0.3s ease;
      }
      .msg.visible { opacity: 1; transform: none; }
      .msg.new-group { margin-top: 8px; }

      /* ── bubble ── */
      .bubble {
        max-width: 82%;
        background: var(--bubble);
        border-radius: 16px 16px 3px 16px;
        padding: 9px 12px 8px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        position: relative;
        overflow: hidden;
      }

      /* left-side state stripe */
      .bubble::after {
        content: "";
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 2px;
      }
      .v-life  .bubble::after { background: var(--life);  box-shadow: 2px 0 8px rgba(125,249,194,0.3); }
      .v-upset .bubble::after { background: var(--upset); box-shadow: 2px 0 8px rgba(255,107,107,0.3); }
      .v-poke  .bubble::after { background: var(--poke);  box-shadow: 2px 0 6px rgba(255,179,71,0.25); }
      .v-none  .bubble::after { background: transparent; }

      .bubble-txt {
        font-size: 14px;
        line-height: 1.7;
        color: var(--text);
        padding-left: 6px;
        word-break: break-word;
      }

      .bubble-foot {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 4px;
        padding-left: 6px;
      }
      .b-time  { font-size: 9px; letter-spacing: 1px; color: var(--dim); }
      .b-state { font-size: 9px; letter-spacing: 0.5px; }
      .st-life  { color: var(--life); }
      .st-upset { color: var(--upset); }
      .st-poke  { color: var(--poke); }

      /* ════════════════════════════════
   REACTION ROW
════════════════════════════════ */
      .reaction-row {
        display: flex;
        gap: 5px;
        padding: 7px 6px 1px;
        margin-top: 5px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
      }

      .r-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 9px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        background: transparent;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--dim);
        cursor: pointer;
        transition: all 0.15s;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      .r-btn:active { transform: scale(0.92); }
      .r-btn:disabled { opacity: 0.4; cursor: default; }

      .r-btn.tapped {
        border-color: rgba(255, 255, 255, 0.18);
        color: var(--text);
      }
      .r-btn.r-0.tapped { border-color: rgba(255,179,71,0.4);  color: var(--poke);  background: rgba(255,179,71,0.07); }
      .r-btn.r-1.tapped { border-color: rgba(125,249,194,0.4); color: var(--life);  background: rgba(125,249,194,0.07); }
      .r-btn.r-2.tapped { border-color: rgba(255,107,107,0.4); color: var(--upset); background: rgba(255,107,107,0.07); }

      .r-count {
        font-size: 9px;
        opacity: 0.65;
        min-width: 6px;
      }
      .r-btn.tapped .r-count { opacity: 1; }

      /* ── loading / error ── */
      #loading {
        align-self: center;
        margin: auto;
        font-size: 10px;
        letter-spacing: 2.5px;
        color: var(--dim);
        animation: flicker 1.6s ease-in-out infinite;
      }
      @keyframes flicker {
        0%, 100% { opacity: 0.3; }
        50%       { opacity: 1; }
      }

      #error {
        display: none;
        align-self: stretch;
        margin: 16px;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid rgba(255,107,107,0.2);
        background: rgba(255,107,107,0.04);
        font-size: 10px;
        line-height: 1.9;
        color: var(--upset);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- TOP NAV -->
      <nav class="topnav">
        <div class="nav-avatar">
          <div class="nav-avatar-inner"></div>
        </div>
        <div class="nav-info">
          <div class="nav-name">ECHO CHAMBER</div>
          <div class="nav-sub" id="nav-sub">shared view ···</div>
        </div>
      </nav>

      <!-- CHAT -->
      <div class="chat" id="chat">
        <div id="loading">reading echoes ···</div>
        <div id="error"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      const LIMIT = 30;

      const db = supabase.createClient(
        "https://nlfryozynimffhwkhhls.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZnJ5b3p5bmltZmZod2toaGxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTExMDAsImV4cCI6MjA4ODEyNzEwMH0.VWLopIlZi7ad6MNA84LEo7ztiWBylzJ6g5Y1jHav1zw",
      );

      /* ── helpers ── */
      function vc(s) {
        if (!Number.isInteger(s)) return "none";
        return s === 1 ? "life" : s === 2 ? "upset" : s === 0 ? "poke" : "none";
      }
      function vl(s) {
        if (!Number.isInteger(s)) return "";
        return s === 1 ? "LIFE" : s === 2 ? "UPSET" : s === 0 ? "POKE" : "";
      }
      function timeBubble(iso) {
        if (!iso) return "";
        return new Date(iso).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
      }
      function dateLabel(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        const now = new Date(); now.setHours(0,0,0,0);
        const yest = new Date(now); yest.setDate(now.getDate() - 1);
        const day = new Date(d); day.setHours(0,0,0,0);
        if (+day === +now)  return "today";
        if (+day === +yest) return "yesterday";
        return d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });
      }
      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      /* ── reaction POST ── */
      async function react(thoughtId, symbol, btn) {
        btn.disabled = true;
        const { error } = await db.from("reactions").insert({ thought_id: thoughtId, symbol });
        if (!error) {
          btn.classList.add("tapped");
          const countEl = btn.querySelector(".r-count");
          const current = parseInt(countEl.textContent) || 0;
          countEl.textContent = String(current + 1);
        }
        btn.disabled = false;
      }

      /* ── render ── */
      function render(thoughts, counts) {
        const chat = document.getElementById("chat");
        chat.querySelectorAll(".msg,.date-sep").forEach(el => el.remove());

        const n = thoughts.length;
        document.getElementById("nav-sub").textContent =
          n + " echo" + (n !== 1 ? "es" : "") + " · shared view";

        if (!n) return;

        const ordered = [...thoughts].reverse(); // oldest first
        let lastDL = null, lastMin = null;

        ordered.forEach((t, i) => {
          const dl = dateLabel(t.created_at);
          if (dl !== lastDL) {
            const sep = document.createElement("div");
            sep.className = "date-sep";
            sep.textContent = dl;
            chat.appendChild(sep);
            lastDL = dl;
            lastMin = null;
          }

          const v = vc(t.trinary_state);
          const vLabel = vl(t.trinary_state);
          const tBub = timeBubble(t.created_at);
          const thisM = t.created_at ? Math.floor(new Date(t.created_at) / 60000) : 0;
          const isNew = lastMin === null || thisM - lastMin > 5;
          lastMin = thisM;

          const c = counts[t.id] || { 0: 0, 1: 0, 2: 0 };

          const msg = document.createElement("div");
          msg.className = "msg v-" + v + (isNew ? " new-group" : "");

          msg.innerHTML = `
      <div class="bubble">
        <div class="bubble-txt">${esc(t.content)}</div>
        <div class="bubble-foot">
          <span class="b-time">${tBub}</span>
          ${vLabel ? `<span class="b-state st-${v}">${vLabel}</span>` : ""}
        </div>
        <div class="reaction-row">
          <button class="r-btn r-0" data-id="${t.id}" data-sym="0">◎ <span class="r-count">${c[0] || ""}</span></button>
          <button class="r-btn r-1" data-id="${t.id}" data-sym="1">♡ <span class="r-count">${c[1] || ""}</span></button>
          <button class="r-btn r-2" data-id="${t.id}" data-sym="2">✕ <span class="r-count">${c[2] || ""}</span></button>
        </div>
      </div>`;

          msg.querySelectorAll(".r-btn").forEach(btn => {
            btn.addEventListener("click", () => {
              react(btn.dataset.id, parseInt(btn.dataset.sym), btn);
            });
          });

          chat.appendChild(msg);
          setTimeout(() => msg.classList.add("visible"), 10 + i * 15);
        });

        requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
      }

      /* ── load ── */
      async function load() {
        const { data: thoughts, error: tErr } = await db
          .from("thoughts")
          .select("id,content,created_at,trinary_state")
          .order("created_at", { ascending: false })
          .limit(LIMIT);

        document.getElementById("loading").style.display = "none";

        if (tErr) {
          const el = document.getElementById("error");
          el.style.display = "block";
          el.innerHTML = `<strong>read failed</strong><br><br>${esc(tErr.message)}`;
          return;
        }

        const rows = thoughts || [];
        const ids = rows.map(t => t.id);

        // build counts map
        const counts = {};
        if (ids.length) {
          const { data: reactions } = await db
            .from("reactions")
            .select("thought_id,symbol")
            .in("thought_id", ids);
          for (const r of (reactions || [])) {
            if (!counts[r.thought_id]) counts[r.thought_id] = { 0: 0, 1: 0, 2: 0 };
            counts[r.thought_id][r.symbol]++;
          }
        }

        render(rows, counts);
      }

      load();
    </script>
  </body>
</html>
