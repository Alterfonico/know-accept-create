<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>meverse</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>

:root {
  --bg:     #07070D;
  --bg2:    #0d0d18;
  --bg3:    #111122;
  --life:   #7DF9C2;
  --upset:  #FF6B6B;
  --poke:   #FFB347;
  --purple: #A78BFA;
  --text:   #D0D0D8;
  --dim:    #484860;
  --muted:  #1e1e2e;
  --border: rgba(255,255,255,0.05);
  --mono:   'IBM Plex Mono', monospace;
  --disp:   'Syne', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

/* HEADER */
header {
  position: sticky;
  top: 0; z-index: 20;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 13px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand {
  font-family: var(--disp);
  font-size: 18px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 4px;
}
.hcount {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--dim);
  margin-top: 2px;
}
.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--life);
  margin-left: auto;
  box-shadow: 0 0 8px var(--life);
  animation: breathe 2.8s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { opacity: 0.3; transform: scale(1); }
  50%     { opacity: 1;   transform: scale(1.35); }
}

/* FILTER BAR */
.filter-bar {
  display: flex; gap: 6px;
  padding: 11px 20px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.filter-bar::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.07);
  background: transparent;
  color: var(--dim);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: all .15s;
}
.chip.a-all  { border-color: rgba(255,255,255,0.22); color: var(--text); }
.chip.a-life { border-color: rgba(125,249,194,.4); color: var(--life); background: rgba(125,249,194,.05); }
.chip.a-up   { border-color: rgba(255,107,107,.4);  color: var(--upset); background: rgba(255,107,107,.05); }
.chip.a-poke { border-color: rgba(255,179,71,.4);   color: var(--poke);  background: rgba(255,179,71,.05); }
.chip.a-mob  { border-color: rgba(167,139,250,.4);  color: var(--purple); background: rgba(167,139,250,.05); }

/* STATES */
#loading {
  padding: 80px 24px; text-align: center;
  font-size: 10px; letter-spacing: 2.5px; color: var(--dim);
  animation: flicker 1.6s ease-in-out infinite;
}
@keyframes flicker { 0%,100%{opacity:.3} 50%{opacity:1} }
#error {
  display: none; margin: 32px 20px; padding: 18px;
  border-radius: 10px; border: 1px solid rgba(255,107,107,.2);
  background: rgba(255,107,107,.04);
  font-size: 10px; line-height: 1.9; color: var(--upset);
}
#empty {
  display: none; padding: 80px 24px; text-align: center;
  font-size: 13px; font-style: italic; color: var(--dim);
}

/* ECHO LIST */
.echo-list { padding-bottom: 80px; }

.echo-row {
  border-bottom: 1px solid var(--border);
  position: relative;
  opacity: 0; transform: translateY(6px);
  transition: opacity .4s ease, transform .4s ease, background .15s;
}
.echo-row.visible { opacity: 1; transform: none; }
.echo-row:active  { background: rgba(255,255,255,0.02); }

.et { display: none; }
.echo-bub { display: block; cursor: pointer; user-select: none; }

/* left accent bar */
.origin-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px; border-radius: 0 1px 1px 0;
}
.o-life  { background: var(--life);  box-shadow: 0 0 8px rgba(125,249,194,.4); }
.o-upset { background: var(--upset); box-shadow: 0 0 8px rgba(255,107,107,.4); }
.o-poke  { background: var(--poke);  box-shadow: 0 0 6px rgba(255,179,71,.3); }
.o-none  { background: var(--muted); }

.echo-body { padding: 15px 20px 13px 20px; }
.echo-txt  {
  font-size: 14px; line-height: 1.75;
  color: var(--text); padding-left: 12px;
  letter-spacing: 0.01em;
}

.echo-foot {
  display: flex; align-items: center; gap: 8px;
  margin-top: 9px; padding-left: 12px;
}
.echo-ts  { font-size: 9px; letter-spacing: 1.5px; color: var(--dim); }
.echo-st  { font-size: 9px; letter-spacing: 1px; margin-left: auto; }
.st-life  { color: var(--life); }
.st-upset { color: var(--upset); }
.st-poke  { color: var(--poke); }
.st-none  { color: var(--dim); }
.echo-arr { font-size: 10px; color: var(--dim); transition: transform .2s, color .2s; }
.et:checked ~ .echo-bub .echo-arr { transform: rotate(180deg); color: var(--text); }

/* DRAWER */
.echo-drawer { max-height: 0; overflow: hidden; transition: max-height .35s cubic-bezier(.16,1,.3,1); }
.et:checked ~ .echo-bub .echo-drawer { max-height: 200px; }

.drawer-pad {
  padding: 2px 20px 18px 32px;
  display: flex; flex-direction: column; gap: 10px;
}
.drawer-meta { display: flex; gap: 20px; flex-wrap: wrap; }
.dm-field    { display: flex; flex-direction: column; gap: 3px; }
.dm-label    { font-size: 8px; letter-spacing: 2px; color: var(--dim); }
.dm-val      { font-size: 11px; letter-spacing: 0.5px; }
.drawer-full { font-size: 9px; letter-spacing: 1px; color: var(--dim); opacity: .7; }

</style>
</head>
<body>

<header>
  <div>
    <div class="brand">MEVERSE</div>
    <div class="hcount" id="hcount">···</div>
  </div>
  <div class="pulse-dot"></div>
</header>

<div class="filter-bar">
  <button class="chip a-all" data-f="all">all</button>
  <button class="chip" data-f="life">● life</button>
  <button class="chip" data-f="upset">● upset</button>
  <button class="chip" data-f="poke">● poke</button>
  <button class="chip" data-f="null">● raw</button>
  <button class="chip" data-f="mobile">mobile</button>
  <button class="chip" data-f="computer">computer</button>
</div>

<div id="loading">reading you ···</div>
<div id="error"></div>
<div id="empty">nothing surfaces here yet</div>
<div class="echo-list" id="feed"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const db = supabase.createClient(
  'https://nlfryozynimffhwkhhls.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZnJ5b3p5bmltZmZod2toaGxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTExMDAsImV4cCI6MjA4ODEyNzEwMH0.VWLopIlZi7ad6MNA84LEo7ztiWBylzJ6g5Y1jHav1zw'
);

let all = [], activeF = 'all';

function vc(s) { return s===2?'life':s===0?'upset':s===1?'poke':'none'; }
function vl(s) { return s===2?'HI · LIFE':s===0?'LO · UPSET':s===1?'FLAT · POKE':'—'; }

function timeAgo(iso) {
  if (!iso) return '—';
  const d = +new Date(iso), now = Date.now(), diff = Math.floor((now-d)/1000);
  if (diff < 60)    return diff+'s ago';
  if (diff < 3600)  return Math.floor(diff/60)+'m ago';
  if (diff < 86400) return Math.floor(diff/3600)+'h ago';
  const days = Math.floor(diff/86400);
  if (days < 7) return days+'d ago';
  return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
}

function timeFull(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})
    +' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(thoughts) {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  document.getElementById('empty').style.display = thoughts.length ? 'none' : 'block';
  document.getElementById('hcount').textContent =
    thoughts.length + ' echo' + (thoughts.length !== 1 ? 's' : '');

  thoughts.forEach((t, i) => {
    const v = vc(t.trinary_state), vLabel = vl(t.trinary_state);
    const row = document.createElement('div');
    row.className = 'echo-row';
    row.innerHTML = `
      <input type="checkbox" id="et${i}" class="et">
      <label for="et${i}" class="echo-bub">
        <div class="echo-body">
          <div class="origin-bar o-${v}"></div>
          <div class="echo-txt">${esc(t.content)}</div>
          <div class="echo-foot">
            <span class="echo-ts">${timeAgo(t.created_at)}</span>
            <span class="echo-st st-${v}">${vLabel}</span>
            <span class="echo-arr">↕</span>
          </div>
        </div>
        <div class="echo-drawer">
          <div class="drawer-pad">
            <div class="drawer-meta">
              <div class="dm-field">
                <div class="dm-label">state</div>
                <div class="dm-val st-${v}">${vLabel}</div>
              </div>
              ${t.state_source?`<div class="dm-field"><div class="dm-label">source</div><div class="dm-val">${esc(t.state_source)}</div></div>`:''}
              ${t.device?`<div class="dm-field"><div class="dm-label">device</div><div class="dm-val">${esc(t.device)}</div></div>`:''}
              ${t.input_type?`<div class="dm-field"><div class="dm-label">input</div><div class="dm-val">${esc(t.input_type)}</div></div>`:''}
            </div>
            <div class="drawer-full">${timeFull(t.created_at)}</div>
          </div>
        </div>
      </label>`;
    feed.appendChild(row);
    setTimeout(() => row.classList.add('visible'), 20 + i * 30);
  });
}

function applyFilter(f) {
  let r = all;
  if      (f==='life')     r = all.filter(t=>t.trinary_state===2);
  else if (f==='upset')    r = all.filter(t=>t.trinary_state===0);
  else if (f==='poke')     r = all.filter(t=>t.trinary_state===1);
  else if (f==='null')     r = all.filter(t=>t.trinary_state===null);
  else if (f==='mobile')   r = all.filter(t=>t.device==='mobile');
  else if (f==='computer') r = all.filter(t=>t.device==='computer');
  render(r);
}

const acMap = {all:'a-all',life:'a-life',upset:'a-up',poke:'a-poke',null:'a-up',mobile:'a-mob',computer:'a-mob'};
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.className='chip');
    const f = c.dataset.f;
    c.classList.add(acMap[f]||'a-all');
    activeF = f;
    applyFilter(f);
  });
});

async function load() {
  const { data, error } = await db
    .from('thoughts')
    .select('id,content,created_at,trinary_state,state_source,device,input_type')
    .order('created_at', { ascending: false })
    .limit(150);

  document.getElementById('loading').style.display = 'none';

  if (error) {
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.innerHTML = `<strong>read failed</strong><br><br>${esc(error.message)}<br><br><span style="opacity:.6">check RLS — anon SELECT policy may be missing</span>`;
    return;
  }
  all = data || [];
  applyFilter(activeF);
}

load();
</script>
</body>
</html>
